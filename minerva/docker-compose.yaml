# =============================================================================
# docker-compose.yaml — Orchestrazione multi-container del progetto Minerva
# Avvio: docker compose up --build
# Porte: backend=8003, frontend=8004, MariaDB=3306, Ollama=11434
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Database MariaDB
  # ---------------------------------------------------------------------------
  database:
    image: mariadb:11.3
    container_name: minerva_database
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: minerva_db
      MYSQL_USER: minerva
      MYSQL_PASSWORD: minerva_pass
    ports:
      - "3306:3306"
    volumes:
      - ./mariadb_data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mariadb_volume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Ollama — LLM locale (scarica il modello automaticamente all'avvio)
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: minerva_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_volume:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 10
        ollama pull qwen3:4b
        wait

  # ---------------------------------------------------------------------------
  # Backend FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minerva_backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DB_HOST: database
      DB_PORT: "3306"
      DB_USER: minerva
      DB_PASSWORD: minerva_pass
      DB_NAME: minerva_db
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:4b
    ports:
      - "8003:8003"
    volumes:
      - ./gs_data:/app/gs_data:ro
      - ./domains.json:/app/domains.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Frontend Jinja2
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minerva_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:8003
    ports:
      - "8004:8004"

volumes:
  mariadb_volume:
  ollama_volume:
